kind = "web"
previewPath = "/"
title = "Herdy Leonardi — Business Coach"
version = "1.0.0"
id = "artifacts/coach-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18999

[services.development]
run = "pnpm --filter @workspace/coach-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coach-site", "run", "build" ]
publicDir = "artifacts/coach-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18999"
BASE_PATH = "/"
